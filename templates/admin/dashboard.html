{% extends 'base.html' %}
{% block content %}
<h3 class='mb-4'>Welcome, {{ session.name }}!</h3>
<div class='row mb-4'>
<div class='col-md-4'>
<div class='card text-center shadow-sm p-3'>
<h2 class='fw-bold text-primary'>{{ stats.students }}</h2>
<p class='text-muted'>Total Students</p>
<a href='/admin/users' class='btn btn-sm btn-outline-primary'>View All</a>
</div></div>
<div class='col-md-4'>
<div class='card text-center shadow-sm p-3'>
<h2 class='fw-bold text-success'>{{ stats.faculty }}</h2>
<p class='text-muted'>Total Faculty</p>
<a href='/admin/users' class='btn btn-sm btn-outline-success'>View All</a>
</div></div>
<div class='col-md-4'>
<div class='card text-center shadow-sm p-3'>
<h2 class='fw-bold text-warning'>{{ stats.subjects }}</h2>
<p class='text-muted'>Total Subjects</p>
<a href='/admin/subjects' class='btn btn-sm btn-outline-warning'>View All</a>
</div></div>
</div>
<div class='row'>
<div class='col-md-6'>
<div class='card shadow-sm p-3'>
<h5>Quick Actions</h5>
<a href='/admin/add-user' class='btn btn-dark w-100 mb-2'>Add Student or Faculty</a>
<a href='/admin/add-subject' class='btn btn-outline-dark w-100'>Add Subject</a>
</div></div>
</div>
{% endblock %}
